services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '3000:3000'
    environment:
      MONGODB_URI: mongodb://mongo:27017/pdffloom
      PORT: 3000

volumes:
  mongo-data:
